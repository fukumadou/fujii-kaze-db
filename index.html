<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fujii Kaze Global Discography</title>
    <style>
        /* アクセシビリティを考慮した配色：背景は落ち着いた茶系、文字は読みやすい明度 */
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #3d3b35; color: #e0dcd5; text-align: center; }
        
        .site-header { padding: 30px 20px 20px; }
        .header-logo-img { max-width: 400px; width: 100%; height: auto; margin-bottom: 20px; }
        .header-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; font-weight: bold; }
        .nav-item { text-decoration: none; color: #e0dcd5; font-size: 14px; }
        
        .container { max-width: 700px; margin: 0 auto; padding: 0 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 5px; font-weight: 300; } 
        .subtitle { margin-bottom: 30px; color: #a8a49c; }
        
        /* ボックスのはみ出しを防ぎつつ、読みやすい配色 */
        .search-box { 
            width: 100%; 
            box-sizing: border-box; 
            padding: 15px; 
            border-radius: 30px; 
            border: 1px solid #555; 
            background: #2a2926; 
            color: #fff; 
            margin-bottom: 30px; 
            text-align: center; 
        }
        .accordion-item { 
            background: #2a2926; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            padding: 20px; 
            text-align: left; 
            color: #fff; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #444;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <img src="kaze-logo.png" alt="Fujii Kaze" class="header-logo-img">
        <nav class="header-nav">
            <a href="#" class="nav-item">HOME</a>
            <a href="#" class="nav-item">ALBUMS</a>
            <a href="#" class="nav-item">SINGLES</a>
        </nav>
    </header>

    <main class="container">
        <h1>Fujii Kaze</h1>
        <p class="subtitle">Global Discography & Directory</p>
        <input type="text" class="search-box" placeholder="Search track or album...">
        
        <div class="accordion-item">【1ST ALBUM】HELP EVER HURT NEVER (2020) <span>▼</span></div>
        <div class="accordion-item">【2ND ALBUM】LOVE ALL SERVE ALL (2022) <span>▼</span></div>
        <div class="accordion-item">【3RD ALBUM】(Album Title) <span>▼</span></div>
        <div class="accordion-item">【DIGITAL SINGLES / OTHER】Singles & Highlights <span>▼</span></div>
    </main>
</body>
</html>
