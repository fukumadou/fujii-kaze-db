<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fujii Kaze Global Discography</title>
    <style>
        /* 全要素に適用することで余白のはみ出しを防ぎます */
        * { box-sizing: border-box; }
        
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #e8e4db; color: #4a453e; text-align: center; }
        .site-header { padding: 20px 20px 5px; }
        .header-logo-img { max-width: 400px; width: 100%; height: auto; margin-bottom: 5px; }
        .header-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; }
        .nav-item { text-decoration: none; color: #4a453e; font-size: 14px; }
        .container { max-width: 700px; margin: 0 auto; padding: 0 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 5px; font-weight: 300; } 
        .subtitle { margin-bottom: 20px; color: #7a766e; }
        
        /* 検索窓を画面幅にぴったり収める設定 */
        .search-box { width: 100%; padding: 15px; border-radius: 30px; border: none; background: #dcd7cc; color: #4a453e; margin-bottom: 20px; text-align: center; display: block; }
        
        .accordion-item { background: #dcd7cc; border-radius: 12px; margin-bottom: 15px; padding: 20px; text-align: left; color: #4a453e; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <header class="site-header">
        <img src="kaze-logo.png" alt="Fujii Kaze" class="header-logo-img">
        <nav class="header-nav">
            <a href="#" class="nav-item">HOME</a>
            <a href="#" class="nav-item">ALBUMS</a>
            <a href="#" class="nav-item">SINGLES</a>
        </nav>
    </header>

    <main class="container">
        <h1>Fujii Kaze</h1>
        <p class="subtitle">Global Discography & Directory</p>
        <input type="text" class="search-box" placeholder="Search track or album... / 楽曲名・アルバム名で検索">
        
        <div class="accordion-item">【1ST ALBUM】<br><strong>HELP EVER HURT NEVER (2020)</strong> <span>▼</span></div>
        <div class="accordion-item">【2ND ALBUM】<br><strong>LOVE ALL SERVE ALL (2022)</strong> <span>▼</span></div>
        <div class="accordion-item">【DIGITAL SINGLES / OTHER】<br><strong>Singles & Highlights</strong> <span>▼</span></div>
    </main>
</body>
</html>
